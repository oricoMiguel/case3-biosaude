name: Deploy One-Page BioSaude

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Deploy via SSH para EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/site
            git pull origin master
            docker stop biosaude || true
            docker rm biosaude || true
            docker build -t biosaude-img .
            docker run -d -p 80:80 --name biosaude biosaude-img